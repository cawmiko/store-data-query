<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商业流转商机查询看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:32px 24px 28px;text-align:center}
.header h1{font-size:22px;font-weight:600;letter-spacing:1px}
.header p{font-size:13px;color:rgba(255,255,255,.6);margin-top:6px}
.container{max-width:1100px;margin:0 auto;padding:20px 16px 40px}
.toolbar{background:#fff;border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:11px;color:#999;letter-spacing:.3px}
.search-box{position:relative;min-width:170px}
.search-box input{width:100%;padding:8px 12px 8px 32px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;transition:border .2s}
.search-box input:focus{border-color:#0f3460}
.search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#bbb}
.dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:8px;max-height:300px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-top:4px}
.dropdown.show{display:block}
.dropdown-item{padding:7px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.dropdown-item:hover{background:#f5f7ff}
.dropdown-item .cnt{color:#999;font-size:11px}
.dropdown-item.active{background:#e8edff;color:#0f3460;font-weight:500}

.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#0f3460;color:#fff}
.btn-primary:hover{background:#1a4a8a}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.stats-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:14px 18px;flex:1;min-width:120px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-card .label{font-size:11px;color:#999;letter-spacing:.3px}
.stat-card .value{font-size:22px;font-weight:700;color:#1a1a2e;margin-top:2px}
.stat-card .sub{font-size:11px;color:#0f3460;margin-top:2px}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.table-header span{font-size:14px;font-weight:600}
.table-header .page-info{font-size:12px;color:#999}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:12px;color:#888;font-weight:500;border-bottom:1px solid #f0f0f0;background:#fafbfc;white-space:nowrap}
td{padding:9px 14px;font-size:13px;border-bottom:1px solid #f5f5f5}
tr:hover td{background:#f9faff}
.pagination{padding:12px 20px;display:flex;justify-content:center;gap:4px;border-top:1px solid #f0f0f0}
.pagination button{padding:6px 12px;border:1px solid #e0e0e0;background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:#555}
.pagination button:hover{border-color:#0f3460;color:#0f3460}
.pagination button.active{background:#0f3460;color:#fff;border-color:#0f3460}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty p{font-size:14px}
.loading{text-align:center;padding:40px;color:#999}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-direct{background:#e8f5e9;color:#2e7d32}
.tag-telesales{background:#fff3e0;color:#e65100}
.tag-channel{background:#e3f2fd;color:#1565c0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notice{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.notice-toggle{width:100%;padding:12px 20px;border:none;background:none;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#0f3460;text-align:left}
.notice-toggle svg{flex-shrink:0;transition:transform .2s}
.notice-toggle.open svg{transform:rotate(180deg)}
.notice-body{padding:0 20px 16px 46px;font-size:12.5px;color:#555;line-height:1.8;display:none}
.notice-body.show{display:block}
.notice-body li{margin-bottom:2px}
.notice-body li::marker{color:#0f3460}
.region-select{position:relative;min-width:130px}
.region-select .region-btn{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:border .2s}
.region-select .region-btn:focus,.region-select.open .region-btn{border-color:#0f3460}
.region-select .region-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:8px;z-index:100;display:none;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-top:4px}
.region-select.open .region-dd{display:block}
.region-dd .dropdown-item{padding:7px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.region-dd .dropdown-item:hover{background:#f5f7ff}
.region-dd .dropdown-item .cnt{color:#999;font-size:11px}
.region-dd .dropdown-item.active{background:#e8edff;color:#0f3460;font-weight:500}
@media(max-width:768px){
  .toolbar{flex-direction:column;align-items:stretch}
  .stats-bar{flex-direction:column}
  th,td{padding:8px 10px;font-size:12px}
  .header h1{font-size:18px}
}
</style>
</head>
<body>

<div class="header">
  <h1>商业流转商机查询看板</h1>
  <p>按大区 / 城市 / 类目筛选门店商机，支持下载 CSV</p>
</div>

<div class="container">
  <div class="notice">
    <button class="notice-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('show')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      表格使用说明
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:auto"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <ol class="notice-body">
      <li>数据源取至26年6月30日-近90天数据，数据仅做参考，实际数据需以提交宜搭时间前90天数据为准</li>
      <li>选取符合作业城市商机同步对应服务商，不允许全量下发</li>
      <li>美食-商业化流转校验SOP</li>
    </ol>
  </div>
  <div class="toolbar">
    <div class="filter-group">
      <label>选择大区</label>
      <div class="region-select" id="regionSelect">
        <button class="region-btn" id="regionBtn" type="button">
          <span id="regionLabel">全部大区</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="region-dd" id="regionDd"></div>
      </div>
    </div>
    <div class="filter-group">
      <label>选择城市</label>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="citySearch" placeholder="搜索城市..." autocomplete="off">
        <div class="dropdown" id="cityDropdown"></div>
      </div>
    </div>
    <div class="filter-group">
      <label>筛选类目</label>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="catSearch" placeholder="搜索类目..." autocomplete="off">
        <div class="dropdown" id="catDropdown"></div>
      </div>
    </div>
    <button class="btn btn-primary" id="btnDownload" disabled onclick="downloadCSV()" style="align-self:flex-end">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      下载 CSV
    </button>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">总商机</div>
      <div class="value" id="totalStores">-</div>
    </div>
    <div class="stat-card">
      <div class="label">覆盖城市</div>
      <div class="value" id="totalCities">-</div>
    </div>
    <div class="stat-card">
      <div class="label">覆盖类目</div>
      <div class="value" id="totalCats">-</div>
    </div>
    <div class="stat-card">
      <div class="label">当前筛选</div>
      <div class="value" id="currentFilter">-</div>
      <div class="sub" id="currentCount"></div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span id="tableTitle">请选择城市</span>
      <span class="page-info" id="pageInfo"></span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr><th>商户 PID</th><th>归属</th><th>城市</th><th>类目</th><th>门店数</th><th>门店名识别</th></tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="empty"><p>请从上方选择城市和类目</p></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PAGE_SIZE = 50;
let indexData = null;
let chunkCache = {};
let currentRegion = '全部';
let currentCity = null;
let currentCat = '全部';
let cityData = [];
let filteredData = [];
let currentPage = 1;
let regionInfo = {};
let cityListByRegion = {};

const TAG_MAP = {'直营':'tag-direct','电销':'tag-telesales','渠道':'tag-channel'};
const REGION_ORDER = ['全部','华东','华北','华西','华南','华中'];

async function init() {
  const resp = await fetch('index.json');
  indexData = await resp.json();
  const cities = Object.keys(indexData);
  const totalStores = cities.reduce((s,c) => s + indexData[c].count, 0);
  document.getElementById('totalStores').textContent = totalStores.toLocaleString();
  document.getElementById('totalCities').textContent = cities.length;

  // Build region info
  regionInfo = {};
  cityListByRegion = {'全部': cities};
  REGION_ORDER.slice(1).forEach(r => { regionInfo[r] = {count: 0, cities: []}; });

  cities.forEach(c => {
    const r = indexData[c].region;
    if (regionInfo[r]) {
      regionInfo[r].count += indexData[c].count;
      regionInfo[r].cities.push(c);
    }
  });
  REGION_ORDER.slice(1).forEach(r => {
    cityListByRegion[r] = regionInfo[r].cities.sort((a,b) => indexData[b].count - indexData[a].count);
  });
  cityListByRegion['全部'] = cities.slice().sort((a,b) => indexData[b].count - indexData[a].count);

  // Collect all categories
  const allCats = {};
  cities.forEach(c => {
    const cats = indexData[c].cats || {};
    Object.keys(cats).forEach(k => { allCats[k] = (allCats[k]||0) + cats[k]; });
  });
  const catNames = Object.keys(allCats).sort((a,b) => allCats[b] - allCats[a]);
  document.getElementById('totalCats').textContent = catNames.length;

  setupRegionSelect();
  setupCitySearch();
  setupCatSearch(catNames, allCats);
}

function setupRegionSelect() {
  const sel = document.getElementById('regionSelect');
  const btn = document.getElementById('regionBtn');
  const dd = document.getElementById('regionDd');

  function render() {
    dd.innerHTML = REGION_ORDER.map(r => {
      const cnt = r === '全部'
        ? Object.values(regionInfo).reduce((s,v) => s + v.count, 0)
        : (regionInfo[r] ? regionInfo[r].count : 0);
      const nCities = r === '全部'
        ? Object.keys(indexData).length
        : (regionInfo[r] ? regionInfo[r].cities.length : 0);
      return `<div class="dropdown-item${r===currentRegion?' active':''}" data-region="${r}">
        <span>${r}</span><span class="cnt">${nCities}城 ${cnt.toLocaleString()}条</span></div>`;
    }).join('');
  }

  btn.addEventListener('click', () => {
    render();
    sel.classList.toggle('open');
  });

  dd.addEventListener('click', e => {
    const item = e.target.closest('.dropdown-item');
    if (item && item.dataset.region) {
      selectRegion(item.dataset.region);
      sel.classList.remove('open');
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#regionSelect')) sel.classList.remove('open');
  });
}

function selectRegion(region) {
  currentRegion = region;
  document.getElementById('regionLabel').textContent = region === '全部' ? '全部大区' : region;

  // Clear city selection when region changes
  currentCity = null;
  cityData = [];
  filteredData = [];
  document.getElementById('citySearch').value = '';
  document.getElementById('btnDownload').disabled = true;
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="empty"><p>请从上方选择城市和类目</p></td></tr>';
  document.getElementById('pagination').innerHTML = '';
  document.getElementById('currentFilter').textContent = region === '全部' ? '-' : region;
  document.getElementById('currentCount').textContent = '';
  document.getElementById('tableTitle').textContent = '请选择城市';
}

function setupCitySearch() {
  const input = document.getElementById('citySearch');
  const dd = document.getElementById('cityDropdown');

  function getVisibleCities() {
    return cityListByRegion[currentRegion] || cityListByRegion['全部'];
  }

  function render(filter) {
    const cities = getVisibleCities();
    const q = (filter||'').trim();
    const matches = q ? cities.filter(c => c.includes(q)) : cities.slice(0, 40);
    if (!matches.length) { dd.innerHTML = '<div class="dropdown-item" style="color:#bbb">无匹配城市</div>'; dd.classList.add('show'); return; }
    dd.innerHTML = matches.map(c =>
      `<div class="dropdown-item${c===currentCity?' active':''}" data-city="${c}"><span>${c}</span><span class="cnt">${indexData[c].count.toLocaleString()} 条</span></div>`
    ).join('');
    dd.classList.add('show');
  }

  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => render(input.value));
  document.addEventListener('click', e => { if (!e.target.closest('#citySearch') && !e.target.closest('#cityDropdown')) dd.classList.remove('show'); });

  dd.addEventListener('click', e => {
    const item = e.target.closest('.dropdown-item');
    if (item && item.dataset.city) {
      selectCity(item.dataset.city);
      input.value = item.dataset.city;
      dd.classList.remove('show');
    }
  });
}

function setupCatSearch(catNames, allCats) {
  const input = document.getElementById('catSearch');
  const dd = document.getElementById('catDropdown');
  const allItems = ['全部', ...catNames];

  function render(filter) {
    const q = (filter||'').trim();
    const matches = q ? allItems.filter(c => c.includes(q)) : allItems;
    if (!matches.length) { dd.innerHTML = '<div class="dropdown-item" style="color:#bbb">无匹配类目</div>'; dd.classList.add('show'); return; }
    dd.innerHTML = matches.map(c => {
      const cnt = c === '全部' ? Object.values(allCats).reduce((a,b)=>a+b,0) : allCats[c];
      return `<div class="dropdown-item${c===currentCat?' active':''}" data-cat="${c}"><span>${c}</span><span class="cnt">${cnt.toLocaleString()} 条</span></div>`;
    }).join('');
    dd.classList.add('show');
  }

  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => render(input.value));
  document.addEventListener('click', e => { if (!e.target.closest('#catSearch') && !e.target.closest('#catDropdown')) dd.classList.remove('show'); });

  dd.addEventListener('click', e => {
    const item = e.target.closest('.dropdown-item');
    if (item && item.dataset.cat !== undefined) {
      currentCat = item.dataset.cat;
      input.value = currentCat;
      dd.classList.remove('show');
      applyFilter();
    }
  });

  input.value = '全部';
}

async function loadChunk(chunkId) {
  if (chunkCache[chunkId]) return chunkCache[chunkId];
  const resp = await fetch(`data/chunk_${chunkId}.json`);
  const data = await resp.json();
  chunkCache[chunkId] = data;
  return data;
}

async function selectCity(city) {
  currentCity = city;
  document.getElementById('btnDownload').disabled = false;
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
  document.getElementById('pagination').innerHTML = '';

  const info = indexData[city];
  const chunk = await loadChunk(info.chunk);
  cityData = (chunk[city] || []).map(r => ({pid:r[0], attr:r[1], city:r[2], stores:r[3], name:r[4], cat:r[5]}));
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  if (!currentCity) return;
  filteredData = currentCat === '全部' ? cityData : cityData.filter(d => d.cat === currentCat);
  currentPage = 1;

  const parts = [];
  if (currentRegion !== '全部') parts.push(currentRegion);
  parts.push(currentCity);
  if (currentCat !== '全部') parts.push(currentCat);
  const label = parts.join(' / ');

  document.getElementById('currentFilter').textContent = label;
  document.getElementById('currentCount').textContent = `${filteredData.length.toLocaleString()} 条记录`;
  document.getElementById('tableTitle').textContent = label + ' 商机明细';
  renderPage();
}

function renderPage() {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');

  if (!pageData.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty"><p>该筛选条件下暂无数据</p></td></tr>';
    document.getElementById('pageInfo').textContent = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = pageData.map(d => {
    const tagClass = TAG_MAP[d.attr] || '';
    return `<tr><td>${d.pid}</td><td><span class="tag ${tagClass}">${d.attr}</span></td><td>${d.city}</td><td>${d.cat||''}</td><td>${d.stores}</td><td>${d.name||''}</td></tr>`;
  }).join('');

  document.getElementById('pageInfo').textContent = `第 ${start+1}-${Math.min(start+PAGE_SIZE, filteredData.length)} 条，共 ${filteredData.length.toLocaleString()} 条`;

  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let html = `<button ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">上一页</button>`;
  const range = getPageRange(currentPage, totalPages, 5);
  for (const p of range) {
    if (p === '...') html += '<button disabled>...</button>';
    else html += `<button class="${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  html += `<button ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})">下一页</button>`;
  pag.innerHTML = html;
}

function getPageRange(cur, total, max) {
  if (total <= max + 2) return Array.from({length:total},(_,i)=>i+1);
  const pages = [1];
  let s = Math.max(2, cur - Math.floor(max/2));
  let e = Math.min(total - 1, s + max - 1);
  s = Math.max(2, e - max + 1);
  if (s > 2) pages.push('...');
  for (let i = s; i <= e; i++) pages.push(i);
  if (e < total - 1) pages.push('...');
  pages.push(total);
  return pages;
}

function goPage(p) { currentPage = p; renderPage(); document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth'}); }

function downloadCSV() {
  if (!currentCity || !filteredData.length) return;
  const BOM = '\uFEFF';
  const header = '商户PID,归属,城市,类目,门店数,门店名识别\n';
  const rows = filteredData.map(d =>
    `"${d.pid}","${d.attr}","${d.city}","${(d.cat||'').replace(/"/g,'""')}","${d.stores}","${(d.name||'').replace(/"/g,'""')}"`
  ).join('\n');
  const blob = new Blob([BOM + header + rows], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const fname = currentCity + (currentCat !== '全部' ? '_' + currentCat : '') + '_商机数据.csv';
  a.download = fname;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`已下载 ${fname}（${filteredData.length} 条）`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
